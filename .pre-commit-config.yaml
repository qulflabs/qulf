repos:
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.4
    hooks:
      - id: commitizen
      
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args: [--fix]

      - id: ruff-format

  - repo: local
    hooks:
      - id: uv-lock-check
        name: Ensure uv.lock is up to date
        entry: >
          bash -c '
            uv lock &&
            if ! git diff --quiet uv.lock; then
              echo "";
              echo "❌ uv.lock is out of date.";
              echo "Run:";
              echo "  uv lock";
              echo "  git add uv.lock";
              exit 1;
            fi
          '
        language: system
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: uv run mypy src/
        language: system
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: uv run pytest tests/ -q
        language: system
        pass_filenames: false
        stages: [pre-push]