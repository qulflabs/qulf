[tools]
node = "24"
"pipx:uv" = "latest"
pnpm = "latest"
python = "3.10"

[env]
PYTHONPATH = "./src"
TEST_ENV = "true"
_.file = ".env"

[tasks.setup]
description = "Set up the virtual environment and install dependencies"
run = """
uv venv --allow-existing
uv sync --all-extras
"""

[tasks.format]
description = "Format code using Ruff"
run = """
uv run ruff format src/ tests/
uv run ruff check --select RUF022 --fix
"""

[tasks.lint]
description = "Lint code and check types"
run = """
uv run ruff check src/ tests/ --fix
uv run mypy src/
"""

[tasks.tests]
depends = ["setup"]
description = "Run the test suite with pytest"
run = """
uv run pytest tests/ -v --cov
"""

[tasks."tests:cov"]
depends = ["setup"]
description = "Run the test suite with pytest"
run = """
uv run pytest --cov=qulf --cov-report=term-missing
"""

[tasks.cln]
[tasks.clean]
description = "Clean up cache files and build artifacts"
run = """
rm -rf .ruff_cache .pytest_cache .mypy_cache dist build *.egg-info
find . -type d -name __pycache__ -exec rm -rf {} +
"""

[tasks.build]
depends = ["setup", "lint", "test"]
description = "Package the project for distribution (PyPI)"
run = "uv build"

[tasks.demo]
description = "Run the FastAPI & SQLAlchemy authentication demo server"
run = 'uv run uvicorn demo.main:app --reload --port ${PORT:-8000}'

[tasks."web:dev"]
description = "Run the web development server"
dir = "web"
run = "pnpm dev"

[tasks."web:build"]
description = "Build the site"
dir = "web"
run = "pnpm build"

[tasks."web:start"]
description = "Start the local production server"
dir = "web"
run = "pnpm start"

[tasks."web:check"]
description = "Check types and code"
dir = "web"
run = "pnpm check"

[tasks."web:format"]
description = "Format code and styles"
dir = "web"
run = "pnpm format"

[tasks.check-release]
description = "Validate repository state before creating a release"
run = '''
BRANCH="$(git symbolic-ref --short HEAD 2>/dev/null || true)"

if [ "$BRANCH" != "main" ]; then
    echo "❌ Releases can only be created from the main branch."
    echo "Current branch: ${BRANCH:-detached HEAD}"
    exit 1
fi

if ! git diff --quiet; then
    echo "❌ Working tree contains unstaged changes."
    exit 1
fi


echo "✅ Repository is ready for release."
'''

[tasks."bump:patch"]
depends = ["check-release"]
run = "uv run cz bump --increment PATCH"

[tasks."bump:minor"]
depends = ["check-release"]
run = "uv run cz bump --increment MINOR"

[tasks."bump:major"]
depends = ["check-release"]
run = "uv run cz bump --increment MAJOR"

[tasks."bump:alpha"]
depends = ["check-release"]
run = "uv run cz bump --prerelease alpha"

[tasks."bump:beta"]
depends = ["check-release"]
run = "uv run cz bump --prerelease beta"

[tasks."bump:rc"]
depends = ["check-release"]
run = "uv run cz bump --prerelease rc"

[tasks.release]
depends = ["check-release"]
description = "Push the latest release commit and tag"
run = """
git push
git push --tags
"""

[tasks.test-wheel]
description = "Test the built wheel in a clean environment"
run = """
uv venv .tmp/test-wheel
uv pip install --python .tmp/test-wheel/bin/python dist/*.whl
uv run --python .tmp/test-wheel/bin/python python -c "import qulf; print(qulf.__version__)"

uv run \
  --python .tmp/test-wheel/bin/python \
  pytest tests/smoke -q

echo "✅ Wheel smoke test passed successfully!"
"""

[settings]
python.uv_venv_auto = "create|source"

[settings.npm]
package_manager = "pnpm"
