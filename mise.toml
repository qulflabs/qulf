[tools]
python = "3.10"
"pipx:uv" = "latest"
node = "24"
pnpm = "latest"

[env]
PYTHONPATH = "src"
TEST_ENV = "true"
_.file = ".env"


[tasks.setup]
description = "Set up the virtual environment and install dependencies"
run = """
uv venv --allow-existing
uv pip install -e ".[dev,test]"
"""

[tasks.format]
description = "Format code using Ruff"
run = "uv run ruff format src/ tests/"

[tasks.lint]
description = "Lint code and check types"
run = """
uv run ruff check src/ tests/ --fix
uv run mypy src/
"""

[tasks.tests]
description = "Run the test suite with pytest"
run = "uv run pytest tests/ -v --cov --junitxml=junit.xml -o junit_family=legacy"
depends = ["setup"]

[tasks.clean]
description = "Clean up cache files and build artifacts"
run = """
rm -rf .ruff_cache .pytest_cache .mypy_cache dist build *.egg-info
find . -type d -name __pycache__ -exec rm -rf {} +
"""

[tasks.build]
description = "Build the package for distribution (PyPI)"
run = "uv build"
depends = ["setup", "lint", "test"]

[tasks.docs]
description = "Run the Fumadocs development server"
dir = "docs"
run = "pnpm dev"

[tasks.demo]
description = "Run the FastAPI & SQLAlchemy authentication demo server"
run = "uv run uvicorn demo.main:app --reload --port 8000"
